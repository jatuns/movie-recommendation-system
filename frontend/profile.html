<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>musicmatch — Profile</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       '#1A1A2E',
            surface:  '#16213E',
            surface2: '#0F3460',
            green:    '#1DB954',
            coral:    '#FF6B6B',
            teal:     '#4ECDC4',
            yellow:   '#FFE66D',
            text:     '#EAEAEA',
            muted:    '#6B7280',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #1A1A2E; color: #EAEAEA; }
    .sidebar-link { transition: all 0.15s; }
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(29,185,84,0.1);
      color: #1DB954;
      border-left-color: #1DB954;
    }

    /* ── mm-animations ── */
    @keyframes mmFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    body{animation:mmFadeUp .22s ease both}
    .mm-stagger>*{opacity:0;animation:mmFadeUp .45s ease forwards}
    .mm-stagger>*:nth-child(1){animation-delay:.04s}.mm-stagger>*:nth-child(2){animation-delay:.11s}
    .mm-stagger>*:nth-child(3){animation-delay:.18s}.mm-stagger>*:nth-child(4){animation-delay:.25s}
    .mm-stagger>*:nth-child(5){animation-delay:.32s}.mm-stagger>*:nth-child(6){animation-delay:.39s}
    .mm-reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
    .mm-reveal.mm-on{opacity:1;transform:none}
    .mm-letter{position:absolute;font-size:clamp(100px,16vw,220px);font-weight:900;opacity:.05;pointer-events:none;user-select:none;top:-.1em;right:-.05em;line-height:1;will-change:transform;color:#EAEAEA}
    @keyframes mmPulseRing{0%,100%{opacity:.55}50%{opacity:.1}}
    .mm-pulse{animation:mmPulseRing 2.2s ease-in-out infinite}
    .mm-pulse2{animation:mmPulseRing 2.2s ease-in-out .7s infinite}
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar"
    class="fixed left-0 top-0 h-full w-64 bg-surface border-r border-white/5 flex flex-col z-40">
  </aside>

  <!-- Main content -->
  <main class="ml-64 flex-1 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-bg/95 backdrop-blur border-b border-white/5 px-8 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-700 flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Your Profile
          </h1>
          <p id="header-username" class="text-sm text-muted"></p>
        </div>
        <span id="personality-pill"
          class="hidden px-3 py-1.5 rounded-full bg-green/10 border border-green/20 text-green text-sm font-600">
        </span>
      </div>
    </header>

    <div class="p-8 flex flex-col gap-8">

      <!-- Top row: Artists + Genres/DNA -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- Top Artists -->
        <div class="mm-reveal bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
          <p class="text-xs font-700 uppercase tracking-widest text-muted">Top Artists</p>
          <div id="artists-list" class="flex flex-col gap-3"></div>
        </div>

        <!-- Genre cloud + Audio DNA -->
        <div class="mm-reveal flex flex-col gap-5">

          <!-- Genre cloud -->
          <div class="bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
            <p class="text-xs font-700 uppercase tracking-widest text-muted">Genre Cloud</p>
            <div id="genre-cloud" class="flex flex-wrap gap-2"></div>
          </div>

          <!-- Audio DNA -->
          <div class="bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
            <p class="text-xs font-700 uppercase tracking-widest text-muted">Audio DNA</p>
            <div id="audio-dna" class="flex flex-col gap-3"></div>
          </div>

        </div>
      </div>

      <!-- Personality Cluster Map -->
      <div class="mm-reveal bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
        <div class="flex items-center justify-between flex-wrap gap-2">
          <div>
            <p class="text-xs font-700 uppercase tracking-widest text-muted">Personality Cluster Map</p>
            <p class="text-xs text-muted mt-1">Where you fall among the 6 music personality types</p>
          </div>
          <span id="cluster-badge" class="hidden px-3 py-1 rounded-full text-xs font-600 border"></span>
        </div>
        <div id="cluster-map-wrap" class="relative w-full" style="min-height:320px">
          <div id="cluster-loading" class="absolute inset-0 flex flex-col items-center justify-center gap-3">
            <svg class="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#6B7280"/></svg>
            <span class="text-sm text-muted">Loading cluster data…</span>
          </div>
          <div id="cluster-map-svg" class="w-full"></div>
        </div>
      </div>

      <!-- Personality Affinity + Emotion Breakdown -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- Personality Affinity -->
        <div class="mm-reveal bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
          <p class="text-xs font-700 uppercase tracking-widest text-muted">Personality Affinity</p>
          <p class="text-xs text-muted -mt-2">How close you are to each personality type</p>
          <div id="affinity-bars" class="flex flex-col gap-4"></div>
        </div>

        <!-- Emotion Breakdown -->
        <div class="mm-reveal bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
          <p class="text-xs font-700 uppercase tracking-widest text-muted">Emotion Breakdown</p>
          <div id="emotion-breakdown" class="flex flex-col gap-3"></div>
        </div>

      </div>

      <!-- Top Tracks -->
      <div class="mm-reveal bg-surface border border-white/5 rounded-2xl p-6 flex flex-col gap-4">
        <p class="text-xs font-700 uppercase tracking-widest text-muted">Top Tracks</p>
        <div id="tracks-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-x-4"></div>
      </div>

    </div>
  </main>

  <script>
    // ── LocalStorage keys ──────────────────────────────────────────────────────
    const LS = {
      session:     'mmSessionId',
      user:        'mmUser',
      personality: 'mmPersonality',
      recs:        'mmRecommendations',
      emotions:    'mmEmotionProfile',
      genres:      'mmAllGenres',
      artists:     'mmArtists',
      tracks:      'mmTracks',
    };

    const IC = {
      home:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
      user:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      book:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
      logout: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
    };

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function disconnect() {
      Object.values(LS).forEach(k => localStorage.removeItem(k));
      window.location.href = '/';
    }

    function renderSidebar(activePage) {
      const user = JSON.parse(localStorage.getItem(LS.user) || '{}');
      const name = user.display_name || 'Music Fan';
      const sid  = localStorage.getItem(LS.session) || '';
      const el   = document.getElementById('sidebar');
      if (!el) return;
      el.innerHTML = `
        <div class="p-6 flex flex-col gap-6 flex-1 overflow-y-auto">
          <a href="/" class="text-lg font-800 tracking-tight">
            music<em class="text-green not-italic">match</em>
          </a>
          <div class="flex items-center gap-3 px-3 py-3 bg-bg/40 rounded-xl">
            <div class="w-9 h-9 rounded-full bg-green/20 flex items-center justify-center text-green font-700 text-sm flex-shrink-0">
              ${name.charAt(0).toUpperCase()}
            </div>
            <div class="min-w-0">
              <p class="text-sm font-600 text-text truncate">${escHtml(name)}</p>
              <p class="text-xs text-muted truncate">Spotify</p>
            </div>
          </div>
          <nav class="flex flex-col gap-1">
            <a href="/dashboard?session_id=${escHtml(sid)}"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='dashboard'?'active':''}">
              ${IC.home} Dashboard
            </a>
            <a href="/profile.html?session_id=${escHtml(sid)}"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='profile'?'active':''}">
              ${IC.user} Profile
            </a>
            <a href="/history.html"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='history'?'active':''}">
              ${IC.book} History
            </a>
          </nav>
          <div class="mt-auto pt-4 border-t border-white/5">
            <button onclick="disconnect()"
              class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-500 text-muted hover:text-coral hover:bg-coral/10 transition-colors">
              ${IC.logout} Disconnect
            </button>
          </div>
        </div>
      `;
    }

    // ── Constants ─────────────────────────────────────────────────────────────
    const EMOTION_COLORS = {
      joy:'#1DB954', sadness:'#4ECDC4', anger:'#FF6B6B', fear:'#FFE66D',
      love:'#FF6B6B', surprise:'#FFE66D', neutral:'#6B7280', disgust:'#FF6B6B', optimism:'#1DB954',
    };
    const CLUSTER_COLORS = {
      'Dark & Introspective':'#4a4a8a', 'Energetic & Bold':'#e84c3d',
      'Feel-good & Social':'#f39c12',   'Moody & Atmospheric':'#2ecc71',
      'Sophisticated & Complex':'#9b59b6', 'Calm & Reflective':'#1abc9c',
    };
    const CLUSTER_EMOJIS = {
      'Dark & Introspective':'🖤', 'Energetic & Bold':'⚡',
      'Feel-good & Social':'☀️',   'Moody & Atmospheric':'🌙',
      'Sophisticated & Complex':'🎭', 'Calm & Reflective':'🌿',
    };

    const audioMetrics = [
      { key:'energy',       label:'Energy',       color:'#1DB954' },
      { key:'valence',      label:'Valence',       color:'#FFE66D' },
      { key:'danceability', label:'Danceability',  color:'#4ECDC4' },
      { key:'acousticness', label:'Acousticness',  color:'#FF6B6B' },
    ];

    // ── Init ──────────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const sid    = params.get('session_id') || localStorage.getItem(LS.session);
    if (sid) localStorage.setItem(LS.session, sid);

    renderSidebar('profile');

    // State — mutable, updated by API calls
    let user        = JSON.parse(localStorage.getItem(LS.user)        || '{}');
    let personality = JSON.parse(localStorage.getItem(LS.personality) || '{}');
    let emotions    = JSON.parse(localStorage.getItem(LS.emotions)    || '{}');
    let genres      = JSON.parse(localStorage.getItem(LS.genres)      || '[]');
    let artists     = JSON.parse(localStorage.getItem(LS.artists)     || '[]');
    let tracks      = JSON.parse(localStorage.getItem(LS.tracks)      || '[]');

    // ── Render functions ──────────────────────────────────────────────────────
    function renderHeader() {
      document.getElementById('header-username').textContent =
        user.display_name ? `@${user.display_name}` : '';
      const pill = document.getElementById('personality-pill');
      if (personality.name) {
        pill.textContent = `${personality.emoji || ''} ${personality.name}`;
        pill.classList.remove('hidden');
      }
    }

    function renderArtists() {
      const el = document.getElementById('artists-list');
      if (!artists.length) {
        el.innerHTML = `<p class="text-sm text-muted">No artist data available.</p>`; return;
      }
      el.innerHTML = artists.slice(0, 10).map((a, i) => {
        const chips = (a.genres || []).slice(0, 3).map(g =>
          `<span class="px-1.5 py-0.5 rounded-md bg-teal/10 border border-teal/20 text-teal text-xs">${escHtml(g)}</span>`
        ).join('');
        const initial = escHtml((a.artist_name||'?').charAt(0).toUpperCase());
        const avatar = a.image_url
          ? `<img src="${escHtml(a.image_url)}" alt="${escHtml(a.artist_name)}"
                  class="w-8 h-8 rounded-full object-cover flex-shrink-0"
                  onerror="this.outerHTML='<div class=\\'w-8 h-8 rounded-full bg-teal/15 flex items-center justify-center text-teal font-700 text-xs flex-shrink-0\\'>${initial}</div>'">`
          : `<div class="w-8 h-8 rounded-full bg-teal/15 flex items-center justify-center text-teal font-700 text-xs flex-shrink-0">${initial}</div>`;
        return `<div class="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
          <span class="text-xs font-700 text-muted w-5 text-right">${i+1}</span>
          ${avatar}
          <div class="flex-1 min-w-0">
            <p class="text-sm font-600 text-text truncate">${escHtml(a.artist_name || '')}</p>
            <div class="flex flex-wrap gap-1 mt-1">${chips}</div>
          </div>
        </div>`;
      }).join('');
    }

    function renderGenreCloud() {
      const el = document.getElementById('genre-cloud');
      // Build source: prefer all_genres flat list; fallback to genres from artist objects
      let source = genres.length ? genres
        : artists.flatMap(a => a.genres || []);
      if (!source.length) {
        el.innerHTML = `<p class="text-sm text-muted">No genre data available.</p>`; return;
      }
      const freq = {};
      source.forEach(g => { freq[g] = (freq[g] || 0) + 1; });
      const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]);
      const maxFreq = sorted[0]?.[1] || 1;
      el.innerHTML = sorted.map(([g, cnt]) => {
        const ratio = cnt / maxFreq;
        const opacity = (0.4 + ratio * 0.6).toFixed(2);
        const size = ratio > 0.7 ? 'text-base' : ratio > 0.4 ? 'text-sm' : 'text-xs';
        return `<span class="${size} font-500 px-3 py-1.5 rounded-full border border-coral/20 cursor-default"
          style="color:#FF6B6B;background:rgba(255,107,107,${(ratio*0.15).toFixed(2)});opacity:${opacity}">
          ${escHtml(g)}</span>`;
      }).join('');
    }

    function renderAudioDNA(af) {
      const el = document.getElementById('audio-dna');
      el.innerHTML = audioMetrics.map(({ key, label, color }) => {
        const val = af[key];
        const pct = val != null ? Math.round(val * 100) : null;
        return `<div>
          <div class="flex justify-between text-xs mb-1.5">
            <span class="text-text">${label}</span>
            <span style="color:${color}" class="font-600">${pct != null ? pct+'%' : '—'}</span>
          </div>
          <div class="h-2 bg-bg rounded-full overflow-hidden">
            <div class="h-2 rounded-full transition-all duration-700"
                 style="width:${pct ?? 0}%;background:${color}"></div>
          </div>
        </div>`;
      }).join('');
    }

    const MUSIC_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;

    function renderTracks() {
      const el = document.getElementById('tracks-grid');
      if (!tracks.length) {
        el.innerHTML = `<p class="text-sm text-muted col-span-2">No track data available.</p>`; return;
      }
      el.innerHTML = tracks.slice(0, 20).map((t, i) => {
        // Wrapper always shows gradient; image overlays it, hides on error
        const thumb = `
          <div class="w-10 h-10 rounded-lg flex-shrink-0 overflow-hidden flex items-center justify-center text-green/50"
               style="background:linear-gradient(135deg,rgba(29,185,84,0.12),rgba(15,52,96,0.5))">
            ${t.album_image
              ? `<img src="${escHtml(t.album_image)}" alt="" class="w-full h-full object-cover" onerror="this.style.display='none'">`
              : MUSIC_ICON}
          </div>`;
        return `
          <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/[0.03] transition-colors">
            <span class="text-xs font-600 text-muted w-4 text-right flex-shrink-0">${i + 1}</span>
            ${thumb}
            <div class="flex-1 min-w-0">
              <p class="text-sm font-600 text-text truncate">${escHtml(t.track_name || '')}</p>
              <p class="text-xs text-muted truncate">${escHtml(t.artist_name || '')}</p>
            </div>
          </div>`;
      }).join('');
    }

    function renderEmotions() {
      const el = document.getElementById('emotion-breakdown');
      const entries = Object.entries(emotions).sort((a,b) => b[1]-a[1]);
      if (!entries.length) {
        el.innerHTML = `<p class="text-sm text-muted">No emotion data available.</p>`; return;
      }
      el.innerHTML = entries.map(([label, val]) => {
        const pct = Math.round(val * 100);
        const color = EMOTION_COLORS[label.toLowerCase()] || '#6B7280';
        return `<div>
          <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm font-600 capitalize text-text">${escHtml(label)}</span>
            <span class="text-xs font-700" style="color:${color}">${pct}%</span>
          </div>
          <div class="h-1.5 bg-bg rounded-full overflow-hidden">
            <div class="h-1.5 rounded-full transition-all duration-700" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>`;
      }).join('');
    }

    function renderAffinity() {
      const el = document.getElementById('affinity-bars');
      const sims = personality.all_similarities || {};
      const entries = Object.entries(sims).sort((a,b) => b[1]-a[1]);
      if (!entries.length) {
        el.innerHTML = `<p class="text-sm text-muted">No affinity data available.</p>`; return;
      }
      el.innerHTML = entries.map(([name, val]) => {
        const pct   = Math.round(val * 100);
        const color = CLUSTER_COLORS[name] || '#6B7280';
        const emoji = CLUSTER_EMOJIS[name] || '';
        const isTop = name === personality.name;
        return `<div>
          <div class="flex justify-between items-center mb-1.5">
            <span class="text-sm font-500 ${isTop ? 'text-text font-700' : 'text-muted'}">${emoji} ${escHtml(name)}</span>
            <span class="text-xs font-700 ${isTop ? '' : 'text-muted'}" style="${isTop ? 'color:'+color : ''}">${pct}%</span>
          </div>
          <div class="h-1.5 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.06)">
            <div class="h-1.5 rounded-full transition-all duration-700"
                 style="width:${pct}%;background:${color};opacity:${isTop ? 1 : 0.5}"></div>
          </div>
        </div>`;
      }).join('');
    }

    // ── Initial render from localStorage ─────────────────────────────────────
    renderHeader();
    renderArtists();
    renderGenreCloud();
    renderAudioDNA({});   // placeholder bars, filled by API
    renderTracks();
    renderEmotions();
    renderAffinity();

    // ── Fetch missing data from API ───────────────────────────────────────────
    // Always fetch from API to ensure fresh/complete data (localStorage may be stale or empty)
    if (sid) {
      // Session data: artists, tracks, genres, user
      fetch(`/api/session/${encodeURIComponent(sid)}`)
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return;
          let changed = false;
          if (data.top_artists?.length) { artists = data.top_artists; localStorage.setItem(LS.artists, JSON.stringify(artists)); changed = true; }
          if (data.top_tracks?.length)  { tracks  = data.top_tracks;  localStorage.setItem(LS.tracks,  JSON.stringify(tracks));  changed = true; }
          if (data.all_genres?.length)  { genres  = data.all_genres;  localStorage.setItem(LS.genres,  JSON.stringify(genres));  changed = true; }
          if (data.user?.display_name)  { user    = data.user;        localStorage.setItem(LS.user,    JSON.stringify(user));    changed = true; }
          if (changed) { renderHeader(); renderArtists(); renderGenreCloud(); renderTracks(); }
          else if (data.top_artists?.length) renderGenreCloud(); // re-render genre cloud with artist genres as fallback
        })
        .catch(() => {});

      // Profile data: emotions, audio features, personality similarities
      fetch(`/api/profile?session_id=${encodeURIComponent(sid)}`)
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return;
          if (data.audio_features)  renderAudioDNA(data.audio_features);
          if (data.emotion_profile && Object.keys(data.emotion_profile).length) {
            emotions = data.emotion_profile;
            localStorage.setItem(LS.emotions, JSON.stringify(emotions));
            renderEmotions();
          }
          if (data.personality?.all_similarities) {
            // Merge into stored personality
            personality = { ...personality, ...data.personality };
            localStorage.setItem(LS.personality, JSON.stringify(personality));
            renderAffinity();
            renderHeader();
          }
        })
        .catch(() => {});
    }

    // ── Personality Cluster Map (SVG) ─────────────────────────────────────────
    function hideClusterLoading() {
      document.getElementById('cluster-loading').style.display = 'none';
    }

    function drawClusterMap(data) {
      const { user_position, centroids, user_personality } = data;
      if (user_personality) {
        const badge = document.getElementById('cluster-badge');
        const color = CLUSTER_COLORS[user_personality] || '#1DB954';
        const emoji = CLUSTER_EMOJIS[user_personality] || '';
        badge.textContent = `${emoji} ${user_personality}`;
        badge.style.color = color;
        badge.style.background = color + '18';
        badge.style.borderColor = color + '40';
        badge.classList.remove('hidden');
      }
      const allX = [...centroids.map(c => c.x), user_position.x];
      const allY = [...centroids.map(c => c.y), user_position.y];
      const pad  = 0.5;
      const minX = Math.min(...allX) - pad, maxX = Math.max(...allX) + pad;
      const minY = Math.min(...allY) - pad, maxY = Math.max(...allY) + pad;
      const W = 100, H = 80;
      const tx = x => ((x-minX)/(maxX-minX)*W).toFixed(2);
      const ty = y => ((1-(y-minY)/(maxY-minY))*H).toFixed(2);
      let defs='', blobs='', dots='', labels='';
      for (const c of centroids) {
        const cx=tx(c.x), cy=ty(c.y);
        const gid='g'+cx.replace('.','')+'_'+cy.replace('.','');
        defs   += `<radialGradient id="${gid}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${c.color}" stop-opacity="0.28"/><stop offset="100%" stop-color="${c.color}" stop-opacity="0"/></radialGradient>`;
        blobs  += `<ellipse cx="${cx}" cy="${cy}" rx="10" ry="8" fill="url(#${gid})"/>`;
        dots   += `<circle cx="${cx}" cy="${cy}" r="1.1" fill="${c.color}"/>`;
        labels += `<text x="${cx}" y="${(+cy+4.2).toFixed(2)}" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="2.4" fill="rgba(234,234,234,0.72)">${c.emoji} ${escHtml(c.name)}</text>`;
      }
      const ux=tx(user_position.x), uy=ty(user_position.y);
      const rings=`<circle cx="${ux}" cy="${uy}" r="4.5" fill="none" stroke="#1DB954" stroke-width="0.4" class="mm-pulse"/>
        <circle cx="${ux}" cy="${uy}" r="2.8" fill="none" stroke="#1DB954" stroke-width="0.5" class="mm-pulse2"/>
        <circle cx="${ux}" cy="${uy}" r="1.4" fill="#1DB954"/>
        <text x="${ux}" y="${(+uy-3.2).toFixed(2)}" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="2.4" font-weight="700" fill="#1DB954">You</text>`;
      document.getElementById('cluster-loading').style.display = 'none';
      document.getElementById('cluster-map-svg').innerHTML =
        `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:320px;display:block">
          <defs>${defs}</defs>${blobs}${dots}${labels}${rings}</svg>`;
    }

    if (sid) {
      fetch(`/api/clusters?session_id=${encodeURIComponent(sid)}`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) drawClusterMap(data); else hideClusterLoading(); })
        .catch(hideClusterLoading);
    } else {
      hideClusterLoading();
    }
  </script>

  <script>
    // Scroll reveal
    const _io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('mm-on');_io.unobserve(e.target)}}),{threshold:.1});
    document.querySelectorAll('.mm-reveal').forEach(el=>_io.observe(el));
    // Parallax ghost letters
    window.addEventListener('scroll',()=>{
      document.querySelectorAll('.mm-letter').forEach(el=>{
        const p=el.parentElement;if(!p)return;
        el.style.transform=`translateY(${p.getBoundingClientRect().top*.12}px)`;
      });
    },{passive:true});
  </script>
</body>
</html>
