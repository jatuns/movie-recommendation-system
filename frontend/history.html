<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>musicmatch — History</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       '#1A1A2E',
            surface:  '#16213E',
            surface2: '#0F3460',
            green:    '#1DB954',
            coral:    '#FF6B6B',
            teal:     '#4ECDC4',
            yellow:   '#FFE66D',
            text:     '#EAEAEA',
            muted:    '#6B7280',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #1A1A2E; color: #EAEAEA; }
    .sidebar-link { transition: all 0.15s; }
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(29,185,84,0.1);
      color: #1DB954;
      border-left-color: #1DB954;
    }
    .session-movies {
      display: none;
      animation: slideDown 0.25s ease;
    }
    .session-movies.open { display: block; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .session-card { cursor: pointer; }

    /* ── mm-animations ── */
    @keyframes mmFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    body{animation:mmFadeUp .22s ease both}
    .mm-stagger>*{opacity:0;animation:mmFadeUp .45s ease forwards}
    .mm-stagger>*:nth-child(1){animation-delay:.04s}.mm-stagger>*:nth-child(2){animation-delay:.11s}
    .mm-stagger>*:nth-child(3){animation-delay:.18s}.mm-stagger>*:nth-child(4){animation-delay:.25s}
    .mm-stagger>*:nth-child(5){animation-delay:.32s}.mm-stagger>*:nth-child(6){animation-delay:.39s}
    .mm-reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
    .mm-reveal.mm-on{opacity:1;transform:none}
    .mm-letter{position:absolute;font-size:clamp(100px,16vw,220px);font-weight:900;opacity:.05;pointer-events:none;user-select:none;top:-.1em;right:-.05em;line-height:1;will-change:transform;color:#EAEAEA}
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar"
    class="fixed left-0 top-0 h-full w-64 bg-surface border-r border-white/5 flex flex-col z-40">
  </aside>

  <!-- Main content -->
  <main class="ml-64 flex-1 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-bg/95 backdrop-blur border-b border-white/5 px-8 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-700 flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Recommendation History
          </h1>
          <p class="text-sm text-muted">All your past music analysis sessions</p>
        </div>
        <span id="session-count" class="hidden text-xs text-muted bg-surface px-3 py-1.5 rounded-full border border-white/5"></span>
      </div>
    </header>

    <div class="p-8">

      <!-- Loading state -->
      <div id="loading-state" class="flex justify-center py-24">
        <div class="flex flex-col items-center gap-4">
          <div class="w-8 h-8 rounded-full border-2 border-green border-t-transparent animate-spin"></div>
          <p class="text-sm text-muted">Loading history...</p>
        </div>
      </div>

      <!-- Error state -->
      <div id="error-state" class="hidden text-center py-24">
        <div class="flex justify-center mb-4">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#FF6B6B;opacity:.7"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2 class="text-lg font-700 mb-2">Couldn't load history</h2>
        <p id="error-msg" class="text-sm text-muted mb-4"></p>
        <button onclick="loadHistory()" class="text-sm text-green hover:underline">Try again</button>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-24">
        <div class="flex justify-center mb-6">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 3.9"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
        </div>
        <h2 class="text-xl font-700 mb-2">No history yet</h2>
        <p class="text-muted text-sm max-w-sm mx-auto mb-8">
          Your past analysis sessions will appear here. Connect Spotify to analyze your music taste.
        </p>
        <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-green text-bg font-600 text-sm
                           hover:-translate-y-0.5 hover:shadow-[0_4px_20px_rgba(29,185,84,0.4)] transition-all">
          Get Started
        </a>
      </div>

      <!-- Sessions list -->
      <div id="sessions-list" class="hidden flex flex-col gap-5"></div>

    </div>
  </main>

  <script>
    // ── LocalStorage keys ──────────────────────────────────────────────────────
    const LS = {
      session:     'mmSessionId',
      user:        'mmUser',
      personality: 'mmPersonality',
      recs:        'mmRecommendations',
      emotions:    'mmEmotionProfile',
      genres:      'mmAllGenres',
      artists:     'mmArtists',
      tracks:      'mmTracks',
    };

    const IC = {
      home:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
      user:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      book:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
      logout: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
    };

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function disconnect() {
      Object.values(LS).forEach(k => localStorage.removeItem(k));
      window.location.href = '/';
    }

    function renderSidebar(activePage) {
      const user = JSON.parse(localStorage.getItem(LS.user) || '{}');
      const name = user.display_name || 'Music Fan';
      const sid  = localStorage.getItem(LS.session) || '';
      const el   = document.getElementById('sidebar');
      if (!el) return;
      el.innerHTML = `
        <div class="p-6 flex flex-col gap-6 flex-1 overflow-y-auto">
          <a href="/" class="text-lg font-800 tracking-tight">
            music<em class="text-green not-italic">match</em>
          </a>
          <div class="flex items-center gap-3 px-3 py-3 bg-bg/40 rounded-xl">
            <div class="w-9 h-9 rounded-full bg-green/20 flex items-center justify-center text-green font-700 text-sm flex-shrink-0">
              ${name.charAt(0).toUpperCase()}
            </div>
            <div class="min-w-0">
              <p class="text-sm font-600 text-text truncate">${escHtml(name)}</p>
              <p class="text-xs text-muted truncate">Spotify</p>
            </div>
          </div>
          <nav class="flex flex-col gap-1">
            <a href="/dashboard?session_id=${escHtml(sid)}"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='dashboard'?'active':''}">
              ${IC.home} Dashboard
            </a>
            <a href="/profile.html?session_id=${escHtml(sid)}"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='profile'?'active':''}">
              ${IC.user} Profile
            </a>
            <a href="/history.html"
               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg border-l-2 border-transparent text-sm font-500 text-muted ${activePage==='history'?'active':''}">
              ${IC.book} History
            </a>
          </nav>
          <div class="mt-auto pt-4 border-t border-white/5">
            <button onclick="disconnect()"
              class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-500 text-muted hover:text-coral hover:bg-coral/10 transition-colors">
              ${IC.logout} Disconnect
            </button>
          </div>
        </div>
      `;
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderSidebar('history');

    const user    = JSON.parse(localStorage.getItem(LS.user) || '{}');
    const userId  = user.user_id;

    if (!userId) {
      showEmpty();
    } else {
      loadHistory();
    }

    async function loadHistory() {
      showLoading();
      try {
        const res  = await fetch(`/api/history/${encodeURIComponent(userId)}`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        const sessions = data.sessions || [];

        const countEl = document.getElementById('session-count');
        countEl.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
        countEl.classList.remove('hidden');

        if (!sessions.length) {
          showEmpty();
        } else {
          renderSessions(sessions);
        }
      } catch(e) {
        showError(e.message);
      }
    }

    function showLoading() {
      document.getElementById('loading-state').classList.remove('hidden');
      document.getElementById('error-state').classList.add('hidden');
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('sessions-list').classList.add('hidden');
    }
    function showEmpty() {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
    }
    function showError(msg) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      document.getElementById('error-msg').textContent = msg || 'Unknown error';
    }

    const EMOTION_COLORS = {
      joy: '#1DB954', sadness: '#4ECDC4', anger: '#FF6B6B',
      fear: '#FFE66D', love: '#FF6B6B', surprise: '#FFE66D',
      neutral: '#6B7280', disgust: '#FF6B6B', optimism: '#1DB954',
    };

    function renderSessions(sessions) {
      document.getElementById('loading-state').classList.add('hidden');
      const container = document.getElementById('sessions-list');
      container.classList.remove('hidden');

      container.innerHTML = sessions
        .slice()
        .reverse()
        .map((sess, i) => {
          const p          = sess.personality || {};
          const emotions   = sess.emotion_profile || {};
          const movies     = sess.recommendations || [];
          const confidence = Math.round((p.confidence || 0) * 100);
          const ts         = sess.timestamp
            ? new Date(sess.timestamp).toLocaleString(undefined, {
                dateStyle: 'medium', timeStyle: 'short'
              })
            : 'Unknown time';

          const topEmotions = Object.entries(emotions)
            .sort((a,b) => b[1]-a[1])
            .slice(0, 3);

          const emotionChips = topEmotions.map(([label, val]) => {
            const color = EMOTION_COLORS[label.toLowerCase()] || '#6B7280';
            return `<span class="px-2 py-0.5 rounded-full text-xs font-500 border"
                         style="color:${color}; border-color:${color}40; background:${color}14">
              ${escHtml(label)} · ${Math.round(val*100)}%
            </span>`;
          }).join('');

          const movieRows = movies.slice(0, 10).map((m, mi) => {
            const mpct = Math.round((m.similarity_score||0)*100);
            return `
              <div class="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
                <div class="w-8 h-11 rounded flex-shrink-0"
                     style="background: linear-gradient(135deg, ${mi%2===0?'#1DB954, #0F3460':'#FF6B6B, #1A1A2E'})">
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-600 text-text truncate">${escHtml(m.title||'')}</p>
                  <p class="text-xs text-muted">${escHtml(String(m.release_year||''))} · ${escHtml((m.genres||[]).slice(0,2).join(', '))}</p>
                </div>
                <div class="text-right flex-shrink-0">
                  <p class="text-xs text-yellow font-600">★ ${(m.vote_average||0).toFixed(1)}</p>
                  <p class="text-xs text-green font-600">${mpct}%</p>
                </div>
              </div>`;
          }).join('');

          return `
            <div class="mm-reveal bg-surface border border-white/5 rounded-2xl overflow-hidden">
              <!-- Card header (clickable) -->
              <div class="session-card p-5 flex flex-col sm:flex-row sm:items-center gap-4"
                   onclick="toggleSession('sess-${i}', this)">
                <!-- Left: personality info -->
                <div class="flex items-center gap-4 flex-1">
                  <span class="text-3xl flex-shrink-0">${escHtml(p.emoji||'🎵')}</span>
                  <div>
                    <div class="flex items-center gap-2 flex-wrap">
                      <p class="font-700 text-text">${escHtml(p.name||'Unknown')}</p>
                      <span class="text-xs px-2 py-0.5 rounded-full bg-green/10 border border-green/20 text-green font-600">
                        ${confidence}% confidence
                      </span>
                    </div>
                    <div class="flex flex-wrap gap-1.5 mt-1.5">${emotionChips}</div>
                  </div>
                </div>
                <!-- Right: meta -->
                <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                  <span class="text-xs text-muted">${escHtml(ts)}</span>
                  <span class="text-xs text-muted">${movies.length} movie${movies.length!==1?'s':''}</span>
                  <div class="expand-arrow text-muted transition-transform duration-200"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
                </div>
              </div>

              <!-- Movies (expandable) -->
              <div id="sess-${i}" class="session-movies border-t border-white/5 px-5 py-4">
                <p class="text-xs font-700 uppercase tracking-widest text-muted mb-3">Recommended Films</p>
                ${movies.length
                  ? `<div class="flex flex-col">${movieRows}</div>`
                  : `<p class="text-sm text-muted">No movies in this session.</p>`
                }
                ${sess.explanation
                  ? `<div class="mt-4 p-4 bg-green/5 border border-green/15 rounded-xl">
                       <p class="text-xs font-700 uppercase tracking-widest text-muted mb-2">Session Note</p>
                       <p class="text-sm text-muted italic">${escHtml(sess.explanation)}</p>
                     </div>`
                  : ''
                }
              </div>
            </div>`;
        }).join('');
    }

    function toggleSession(id, headerEl) {
      const panel = document.getElementById(id);
      const arrow = headerEl.querySelector('.expand-arrow');
      if (!panel) return;
      const isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      if (arrow) {
        arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
      }
    }
  </script>

  <script>
    // Scroll reveal
    const _io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('mm-on');_io.unobserve(e.target)}}),{threshold:.1});
    document.querySelectorAll('.mm-reveal').forEach(el=>_io.observe(el));
    // Parallax ghost letters
    window.addEventListener('scroll',()=>{
      document.querySelectorAll('.mm-letter').forEach(el=>{
        const p=el.parentElement;if(!p)return;
        el.style.transform=`translateY(${p.getBoundingClientRect().top*.12}px)`;
      });
    },{passive:true});
  </script>
</body>
</html>
